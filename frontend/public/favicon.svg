<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="512" height="512" fill="transparent"/>
  
  <!-- Shield outer border (red/dark) -->
  <path d="M256 60 L380 140 L380 280 C380 400 256 450 256 450 C256 450 132 400 132 280 L132 140 Z" fill="#9f1239" stroke="none"/>
  
  <!-- Shield middle border (red lighter) -->
  <path d="M256 85 L360 150 L360 280 C360 380 256 420 256 420 C256 420 152 380 152 280 L152 150 Z" fill="#DC2626" stroke="none"/>
  
  <!-- Shield inner (orange gradient) -->
  <defs>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#DC2626;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F59E0B;stop-opacity:1" />
    </linearGradient>
  </defs>
  <path d="M256 100 L350 155 L350 280 C350 370 256 410 256 410 C256 410 162 370 162 280 L162 155 Z" fill="url(#shieldGrad)" stroke="white" stroke-width="3"/>
  
  <!-- Building/Temple pillars -->
  <g>
    <!-- Roof triangle -->
    <path d="M200 200 L256 160 L312 200 Z" fill="white" stroke="none"/>
    
    <!-- Roof line horizontal -->
    <line x1="200" y1="200" x2="312" y2="200" stroke="white" stroke-width="3"/>
    
    <!-- Pillars -->
    <rect x="210" y="210" width="8" height="70" fill="white"/>
    <rect x="232" y="210" width="8" height="70" fill="white"/>
    <rect x="254" y="210" width="8" height="70" fill="white"/>
    <rect x="276" y="210" width="8" height="70" fill="white"/>
    <rect x="298" y="210" width="8" height="70" fill="white"/>
    
    <!-- Base line -->
    <line x1="200" y1="280" x2="312" y2="280" stroke="white" stroke-width="3"/>
    
    <!-- Dot on roof -->
    <circle cx="256" cy="175" r="6" fill="white"/>
  </g>
  
  <!-- Swoosh lines (curved) -->
  <g>
    <!-- Left swoosh -->
    <path d="M130 280 Q100 320 110 360" stroke="#F59E0B" stroke-width="12" fill="none" stroke-linecap="round"/>
    
    <!-- Right swoosh -->
    <path d="M400 200 Q450 220 440 280" stroke="#F59E0B" stroke-width="12" fill="none" stroke-linecap="round"/>
  </g>
</svg>
